name: Build
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-java:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
      - name: Build assinador with Maven
        run: mvn -B package --file assinador/pom.xml
      - name: Upload Java Artifact
        uses: actions/upload-artifact@v4
        with:
          name: assinador-jar
          path: assinador/target/assinador.jar

  build-go:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        os: [linux, windows, darwin]
        arch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      - name: Build Go CLI
        run: |
          cd cli
          GOOS=${{ matrix.os }} GOARCH=${{ matrix.arch }} go build -o ../assinatura-${{ matrix.os }}-${{ matrix.arch }} .
      - name: Upload Go Artifact
        uses: actions/upload-artifact@v4
        with:
          name: assinatura-${{ matrix.os }}-${{ matrix.arch }}
          path: assinatura-${{ matrix.os }}-${{ matrix.arch }}
